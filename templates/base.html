<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Brain Tumor Classification{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <nav class="nav">
    <a class="brand" href="{{ url_for('index') }}">Brain MRI Classifier</a>
    <button class="nav-toggle" type="button" aria-label="Open navigation">☰</button>
    <div class="nav-links">
      <a href="{{ url_for('index') }}">Home</a>
      <a href="{{ url_for('about') }}">About</a>
      <a href="{{ url_for('predict') }}">Upload</a>
      <a href="{{ url_for('dashboard') }}">Dashboard</a>
    </div>
  </nav>
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="flash-wrap">
        {% for message in messages %}
          <div class="flash">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>
    <p>Educational medical imaging demo. Not a clinical diagnosis tool.</p>
  </footer>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
