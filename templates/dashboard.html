<!DOCTYPE html>
<html>
<head>
    <title>Model Performance Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h1>Model Performance Dashboard</h1>

<div class="mb-3">

    <a href="/" class="btn btn-primary">
        Home
    </a>

    <a href="/history" class="btn btn-success">
        History
    </a>

</div>

<table class="table table-striped table-bordered">

<tr class="table-dark">
    <th>Algorithm</th>
    <th>Accuracy (%)</th>
    <th>Precision (%)</th>
    <th>Recall (%)</th>
    <th>F1 Score (%)</th>
</tr>

{% for row in results %}

<tr>
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
    <td>{{ row[3] }}</td>
    <td>{{ row[4] }}</td>
</tr>

{% endfor %}

</table>

<div class="alert alert-success mt-4">
    <h4>Best Model</h4>
    <p>
        Random Forest achieved the highest accuracy of 80.39%.
    </p>
</div>

</body>
</html>
